version: '3.8'

services:
  postgres:
    image: postgres:14.2
    environment:
      - POSTGRES_USER=chainlink
      - POSTGRES_PASSWORD=chainlink_password
      - POSTGRES_DB=chainlink_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  chainlink:
    image: smartcontract/chainlink:1.13.1
    user: root
    # 终极绝杀：强行覆盖默认的 chainlink 入口，改为标准 shell
    entrypoint: /bin/sh
    # 多行命令清晰化：先写密码，再写账号，最后显式调用 chainlink 启动节点
    command: >
      -c 'echo "Fan!CrossChain2026@StrongPassword" > /chainlink/.password &&
      echo "admin@crosschain.local" > /chainlink/.api &&
      echo "Admin@Chainlink2026" >> /chainlink/.api &&
      chainlink local n -p /chainlink/.password -a /chainlink/.api'
    environment:
      - ROOT=/chainlink
      - LOG_LEVEL=debug
      - ETH_CHAIN_ID=11155111
      - MIN_OUTGOING_CONFIRMATIONS=1
      - LINK_CONTRACT_ADDRESS=0x779877A7B0D9E8603169DdbD7836e478b4624789
      - DATABASE_URL=postgresql://chainlink:chainlink_password@postgres:5432/chainlink_db?sslmode=disable
      - ALLOW_ORIGINS=*
      - SECURE_COOKIES=false
      - CHAINLINK_TLS_PORT=0
      - ETH_URL=wss://rpc.ankr.com/eth_sepolia/ws
    ports:
      - "6688:6688"
    volumes:
      - cldata:/chainlink
    depends_on:
      - postgres

volumes:
  pgdata:
  cldata:
